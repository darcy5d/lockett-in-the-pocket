<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AFL Match Predictor{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ range(100000) | random }}" />
</head>
<body class="bg-dark text-light">

  <nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-4">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold fs-4 text-warning">AFL MATCH PREDICTOR</span>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-secondary text-light">2026 Season</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
